<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Komal 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

/* Text */
h1 {
    margin-top: 10%;
    font-size: 2em;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff4da6;
}

/* Countdown */
#countdown {
    font-size: 2em;
    margin-top: 20px;
}

/* Button */
button {
    margin-top: 20px;
    padding: 12px 25px;
    border: none;
    border-radius: 20px;
    background: white;
    color: #ff4e50;
    font-size: 16px;
    cursor: pointer;
}

/* Floating Images */
.photo {
    position: absolute;
    bottom: -150px;
    width: 120px;
    height: 120px;
    border-radius: 15px;
    object-fit: cover;
    animation: floatUp linear infinite;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}

/* Popup */
#popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%) scale(0);
    background: white;
    color: #ff4e50;
    padding: 30px;
    border-radius: 20px;
    text-align: center;
    transition: 0.3s;
}

#popup.show {
    transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<h1>
Happy Birthday 🎂 <br>
Dear Komal 🫶❤️ <br>
In Advance 💓
</h1>

<div id="countdown"></div>

<button onclick="showLove()">Click me 👀</button>

<div id="popup">
    <h2>I really like you Komal 💙</h2>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
// Countdown
const birthday = new Date("May 2, 2026 00:00:00").getTime();

setInterval(function () {
    const now = new Date().getTime();
    const distance = birthday - now;

    const d = Math.floor(distance / (1000*60*60*24));
    const h = Math.floor((distance / (1000*60*60)) % 24);
    const m = Math.floor((distance / (1000*60)) % 60);
    const s = Math.floor((distance / 1000) % 60);

    document.getElementById("countdown").innerHTML =
    d + " Days " + h + " Hours " + m + " Min " + s + " Sec";
}, 1000);

// Photos
const photos = ["p1.jpg","p2.jpg","p3.jpg","p4.jpg","p5.jpg"];

function createPhoto() {
    const img = document.createElement("img");
    img.src = photos[Math.floor(Math.random()*photos.length)];
    img.classList.add("photo");

    img.style.left = Math.random() * 100 + "vw";
    img.style.animationDuration = (Math.random()*3+4)+"s";

    document.body.appendChild(img);

    setTimeout(()=>img.remove(),7000);
}
setInterval(createPhoto, 800);

// Popup + Music
function showLove() {
    document.getElementById("popup").classList.add("show");
    document.getElementById("music").play();
}
</script>

</body>
</html>
