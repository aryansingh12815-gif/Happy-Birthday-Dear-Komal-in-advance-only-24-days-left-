<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Komal 💖</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: 'Segoe UI', sans-serif;
    text-align: center;
    background: linear-gradient(135deg, #ff758c, #ff7eb3);
    color: white;
}

h1 {
    margin-top: 10%;
    font-size: 2em;
    text-shadow: 0 0 10px #fff, 0 0 20px #ff4da6;
}

#countdown {
    font-size: 2em;
    margin-top: 20px;
}

.photo {
    position: absolute;
    bottom: -150px;
    width: 120px;
    height: 120px;
    border-radius: 15px;
    object-fit: cover;
    animation: floatUp linear infinite;
    box-shadow: 0 0 15px rgba(255,255,255,0.6);
}

@keyframes floatUp {
    from { transform: translateY(0); }
    to { transform: translateY(-120vh); }
}
</style>
</head>

<body>

<h1>
Happy Birthday 🎂 <br>
Dear Komal 🫶❤️ <br>
In Advance 💓
</h1>

<div id="countdown"></div>

<audio autoplay loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
// Countdown
const birthday = new Date("May 2, 2026 00:00:00").getTime();

setInterval(function () {
    const now = new Date().getTime();
    const distance = birthday - now;

    const d = Math.floor(distance / (1000*60*60*24));
    const h = Math.floor((distance / (1000*60*60)) % 24);
    const m = Math.floor((distance / (1000*60)) % 60);
    const s = Math.floor((distance / 1000) % 60);

    document.getElementById("countdown").innerHTML =
    d + " Days " + h + " Hours " + m + " Min " + s + " Sec";
}, 1000);

// Floating Photos
const photos = ["p1.jpg","p2.jpg","p3.jpg","p4.jpg","p5.jpg"];

function createPhoto() {
    const img = document.createElement("img");
    img.src = photos[Math.floor(Math.random()*photos.length)];
    img.classList.add("photo");

    img.style.left = Math.random() * 100 + "vw";
    img.style.animationDuration = (Math.random()*3+4)+"s";

    document.body.appendChild(img);

    setTimeout(()=>img.remove(),7000);
}
setInterval(createPhoto, 800);
</script>

</body>
</html>
